# Country-level aggregate parcel demand parameters.
#
# Fields per country (ISO 3166-1 alpha-2 key):
#   annual_parcels_per_hh   : average e-commerce parcels delivered per household per year
#   home_delivery_fraction  : share of parcels delivered to home vs. pickup point / locker
#   delivery_days_per_year  : working delivery days
#   source                  : primary data source
#
# All values are residential estimates. B2B parcels are excluded.
# Parameters should be re-calibrated when newer national surveys are available.

# ── Europe ────────────────────────────────────────────────────────────────────

